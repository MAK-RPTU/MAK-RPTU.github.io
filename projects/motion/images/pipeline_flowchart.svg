<svg viewBox="0 0 1580 250" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#333333"/>
    </marker>
    <marker id="arrowDash" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#888888"/>
    </marker>
  </defs>

  <!-- ================= EDGES ================= -->
  <!-- Operator -> Natural language -->
  <line x1="133" y1="114" x2="170" y2="114" stroke="#333333" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="151" y="56" font-size="12" fill="#555555" text-anchor="middle">prompt</text>

  <!-- Natural language -> Grounded plan -->
  <line x1="370" y1="114" x2="403" y2="114" stroke="#333333" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="386" y="56" font-size="12" fill="#555555" text-anchor="middle">LLM plans</text>

  <!-- Grounded plan -> 3D scene -->
  <line x1="603" y1="114" x2="636" y2="114" stroke="#333333" stroke-width="1.6" marker-end="url(#arrow)"/>
  <!-- 3D scene -> Simulation -->
  <line x1="836" y1="114" x2="869" y2="114" stroke="#333333" stroke-width="1.6" marker-end="url(#arrow)"/>
  <!-- Simulation -> Policy training -->
  <line x1="1069" y1="114" x2="1102" y2="114" stroke="#333333" stroke-width="1.6" marker-end="url(#arrow)"/>
  <!-- Policy training -> Unitree G1 -->
  <line x1="1302" y1="114" x2="1335" y2="114" stroke="#333333" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- Feedback loop: Unitree G1 -> Operator -->
  <path d="M1442,160 L1442,212 L75,212 L75,148" fill="none" stroke="#888888" stroke-width="1.4"
        stroke-dasharray="5 4" marker-end="url(#arrowDash)"/>
  <text x="758" y="228" font-size="12" fill="#777777" text-anchor="middle">verify · retry · stream</text>

  <!-- ================= NODES ================= -->
  <!-- Operator -->
  <ellipse cx="75" cy="114" rx="58" ry="34" fill="#149e8e"/>
  <text x="75" y="118" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Operator</text>

  <!-- Natural language -->
  <rect x="175" y="68" width="195" height="92" rx="6" fill="#141414"/>
  <text x="272" y="100" font-size="13.5" font-weight="bold" fill="#ffffff" text-anchor="middle">Natural language</text>
  <text x="272" y="124" font-size="12" font-style="italic" fill="#bdbdbd" text-anchor="middle">“sort packages by colour”</text>

  <!-- Grounded plan -->
  <rect x="408" y="68" width="195" height="92" rx="6" fill="#141414"/>
  <text x="505" y="100" font-size="13.5" font-weight="bold" fill="#ffffff" text-anchor="middle">Grounded plan</text>
  <text x="505" y="124" font-size="11.5" fill="#bdbdbd" text-anchor="middle">Skill Library · 11 atomic skills</text>

  <!-- 3D scene + assets -->
  <rect x="641" y="68" width="195" height="92" rx="6" fill="#141414"/>
  <text x="738" y="96" font-size="13.5" font-weight="bold" fill="#ffffff" text-anchor="middle">3D scene + assets</text>
  <text x="738" y="118" font-size="11.5" fill="#bdbdbd" text-anchor="middle">WorldLabs · Polyhaven ·</text>
  <text x="738" y="134" font-size="11.5" fill="#bdbdbd" text-anchor="middle">Meshy · Blender</text>

  <!-- Simulation -->
  <rect x="874" y="68" width="195" height="92" rx="6" fill="#141414"/>
  <text x="971" y="96" font-size="13.5" font-weight="bold" fill="#ffffff" text-anchor="middle">Simulation</text>
  <text x="971" y="118" font-size="11.5" fill="#bdbdbd" text-anchor="middle">MuJoCo · Isaac Lab ·</text>
  <text x="971" y="134" font-size="11.5" fill="#bdbdbd" text-anchor="middle">KIMODO motion gen</text>

  <!-- Policy training -->
  <rect x="1107" y="68" width="195" height="92" rx="6" fill="#141414"/>
  <text x="1204" y="96" font-size="13.5" font-weight="bold" fill="#ffffff" text-anchor="middle">Policy training</text>
  <text x="1204" y="118" font-size="11.5" fill="#bdbdbd" text-anchor="middle">Newton RL · GR00T VLA ·</text>
  <text x="1204" y="134" font-size="11.5" fill="#bdbdbd" text-anchor="middle">Teach pipeline</text>

  <!-- Unitree G1 -->
  <rect x="1335" y="68" width="210" height="92" rx="6" fill="#149e8e"/>
  <text x="1440" y="106" font-size="13.5" font-weight="bold" fill="#ffffff" text-anchor="middle">Unitree G1</text>
  <text x="1440" y="128" font-size="11.5" fill="#eafaf7" text-anchor="middle">Gemini ER 1.6 perception</text>
</svg>
